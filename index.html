<h2>ログイン</h2>

<input id="room" placeholder="部屋番号">
<input id="pass" type="password" placeholder="パスワード">
<button onclick="login()">ログイン</button>

<script>
function login() {
  fetch('/login', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      room_number: document.getElementById('room').value,
      password: document.getElementById('pass').value
    })
  })
  .then(res=>res.text())
  .then(msg=>{
    alert(msg);
    if(msg==="ログイン成功"){
      location.href = "/";
    }
  });
}
</script>
